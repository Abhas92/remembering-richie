<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share a Memory — Remembering Richie</title>
<meta name="description" content="Share a cherished memory of Abeer, lovingly known as Richie.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d0a07'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='22' font-weight='400' fill='%23c9a84c' text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;--gold-light:#e2cc7e;--gold-dim:rgba(201,168,76,0.15);
  --cream:#faf6f0;--cream-dark:#f0ead8;--warm:#f5ead6;
  --dark:#0d0a07;--dark-mid:#1a1510;--dark-soft:#2a2015;--brown:#5a4a35;--brown-light:#8a7a65;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);font-weight:300;color:var(--warm);background:var(--dark);-webkit-font-smoothing:antialiased;line-height:1.7;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem}
h1,h2{font-family:var(--sans);font-weight:300;line-height:1.2;letter-spacing:-.01em}

/* Background glow — breathing animation */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(201,168,76,.08) 0%,transparent 60%);pointer-events:none;z-index:0;animation:glowPulse 6s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:.6}50%{opacity:1}}

/* Floating gold particles */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.5),transparent);animation:particleFloat linear infinite}
@keyframes particleFloat{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:.6;transform:translateY(85vh) scale(1)}
  90%{opacity:.2}
  100%{transform:translateY(-5vh) scale(.3);opacity:0}
}

/* Container */
.container{position:relative;z-index:1;width:100%;max-width:480px;text-align:center}

/* Entrance animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes expandLine{from{width:0}to{width:60px}}

/* Header */
.header{margin-bottom:2.5rem}
.ornament{width:60px;height:1px;margin:0 auto 1.5rem;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:expandLine .8s ease-out both}
.header h1{font-size:clamp(2rem,6vw,3rem);color:var(--warm);margin-bottom:.3rem;animation:fadeUp 1.2s ease-out .2s both}
.header .dates{font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:var(--warm);opacity:.3;margin-bottom:1.5rem;animation:fadeIn 1.5s ease-out .5s both}
.header .sub{color:var(--brown-light);font-size:.95rem;animation:fadeUp 1.2s ease-out .7s both}

/* Form */
.mem-form{display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem}
.mem-form input,.mem-form textarea{font-family:var(--sans);font-size:1rem;padding:.9rem 1.1rem;border:1px solid rgba(201,168,76,.2);border-radius:8px;background:rgba(255,255,255,.06);color:var(--warm);outline:none;transition:border-color .3s,box-shadow .3s;animation:fadeUp .8s ease-out both}
.mem-form input:nth-child(1){animation-delay:.9s}
.mem-form input:nth-child(2){animation-delay:1.05s}
.mem-form textarea{animation-delay:1.2s}
.mem-form input::placeholder,.mem-form textarea::placeholder{color:var(--brown-light)}
.mem-form input:focus,.mem-form textarea:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,.1)}
.mem-form textarea{min-height:120px;resize:vertical}
.mem-form button{font-family:var(--sans);font-size:1.1rem;padding:.9rem 2rem;background:linear-gradient(135deg,var(--gold),#b89540);color:var(--dark);border:none;border-radius:8px;cursor:pointer;letter-spacing:.05em;transition:transform .2s,box-shadow .2s;animation:fadeUp .8s ease-out 1.35s both}
.mem-form button:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(201,168,76,.35)}
.note{font-size:.78rem;color:var(--brown-light);animation:fadeIn 1s ease-out 1.5s both}

/* Thank you message */
@keyframes scaleIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.thank-you{display:none;padding:2.5rem 1.5rem;text-align:center}
.thank-you.visible{animation:scaleIn .6s ease-out both}
.thank-you h2{font-size:1.8rem;color:var(--warm);margin-bottom:.8rem}
.thank-you p{color:var(--brown-light);font-style:italic;margin-bottom:1.5rem}
.thank-you .candle{font-size:2.5rem;margin-bottom:1rem;animation:flicker 2s ease-in-out infinite}
@keyframes flicker{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)}}
.thank-you .another{font-family:var(--sans);font-size:.9rem;color:var(--gold);cursor:pointer;text-decoration:underline;text-underline-offset:3px;opacity:.7;transition:opacity .3s}
.thank-you .another:hover{opacity:1}

/* Footer */
.footer{margin-top:2.5rem;font-size:.7rem;color:var(--brown-light);opacity:.4;letter-spacing:.15em;animation:fadeIn 1.5s ease-out 1.8s both}
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="container">
  <div class="header">
    <div class="ornament"></div>
    <h1>Remembering Abeer</h1>
    <div class="dates">1989 &mdash; 2026</div>
    <div class="sub">If Richie touched your life, leave a few words for the family</div>
  </div>

  <div id="form-area">
    <form class="mem-form" id="mem-form">
      <input type="text" id="m-name" placeholder="Your name" required>
      <input type="text" id="m-rel" placeholder="How you knew Richie (optional)">
      <textarea id="m-text" placeholder="Share your favourite memory, a story, or simply a few words..." required></textarea>
      <button type="submit">Leave a Memory</button>
      <div class="note">Your words will be cherished by the family</div>
    </form>
  </div>

  <div class="thank-you" id="thank-you">
    <div class="candle">🕯️</div>
    <h2>Thank You</h2>
    <p>Your memory has been shared with the family.<br>Richie lives on in our hearts.</p>
    <span class="another" id="another-btn">Share another memory</span>
  </div>

  <div class="footer">Forever in our hearts</div>
</div>

<!-- Firebase Realtime Database (free Spark plan) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyAyB7OAGgg_gkoKDJM89iwhzfqkItUYCoI",
  authDomain: "abeer-memorial.firebaseapp.com",
  databaseURL: "https://abeer-memorial-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "abeer-memorial",
  storageBucket: "abeer-memorial.firebasestorage.app",
  messagingSenderId: "380607339742",
  appId: "1:380607339742:web:df0eefa061a58223d0364f"
};
var firebaseReady = false;
var memoriesRef = null;
try {
  if (FIREBASE_CONFIG.databaseURL) {
    firebase.initializeApp(FIREBASE_CONFIG);
    memoriesRef = firebase.database().ref('memories');
    firebaseReady = true;
  }
} catch(e) {
  console.warn('Firebase init failed:', e);
}

// Floating particles
(function(){
  var c=document.getElementById('particles');
  for(var i=0;i<12;i++){
    var p=document.createElement('div');
    p.className='particle';
    var s=Math.random()*3+1;
    p.style.width=s+'px';p.style.height=s+'px';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(Math.random()*12+10)+'s';
    p.style.animationDelay=(Math.random()*8)+'s';
    c.appendChild(p);
  }
})();

// Form logic
(function(){
  var form=document.getElementById('mem-form');
  var formArea=document.getElementById('form-area');
  var thankYou=document.getElementById('thank-you');

  form.addEventListener('submit',function(e){
    e.preventDefault();
    var name=document.getElementById('m-name').value.trim();
    var rel=document.getElementById('m-rel').value.trim();
    var text=document.getElementById('m-text').value.trim();
    if(!name||!text)return;
    var entry={name:name,relation:rel,memory:text,date:new Date().toISOString()};

    if (firebaseReady) {
      memoriesRef.push(entry);
    }
    form.reset();
    formArea.style.display='none';
    thankYou.style.display='block';
    thankYou.classList.add('visible');
  });

  document.getElementById('another-btn').addEventListener('click',function(){
    thankYou.style.display='none';
    thankYou.classList.remove('visible');
    formArea.style.display='block';
  });
})();
</script>
</body>
</html>
